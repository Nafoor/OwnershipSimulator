<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Ownership Simulator — PRYPCO</title>
<style>
  :root{
    --uv:#5336FF; --lav:#7572FF; --gold:#FFBE1B;
    --night:#0E0A22; --night2:#171036; --txt:#EDEAFF; --txt2:#B7B0D9; --mut:#857DB0;
    --glass:rgba(255,255,255,0.05); --gline:rgba(255,255,255,0.11);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:var(--txt);
    background:radial-gradient(1200px 700px at 70% -10%, #241a52 0%, var(--night2) 40%, var(--night) 100%);
    min-height:100vh;overflow-x:hidden}
  #stars{position:fixed;inset:0;z-index:0;pointer-events:none}
  .star{position:absolute;border-radius:50%;background:#fff}
  .wrap{position:relative;z-index:1;max-width:820px;margin:0 auto;padding:26px 18px 60px}
  .hdr{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
  .brandrow{display:flex;align-items:center;gap:8px;font-weight:800;font-size:17px;letter-spacing:-.02em}
  .sq{width:11px;height:11px;background:var(--uv);border-radius:2px;display:inline-block}
  .title{font-size:26px;font-weight:800;letter-spacing:-.02em;margin-top:3px}
  .tagline{font-size:13px;color:var(--txt2);margin-top:2px}
  .ghost{background:var(--glass);border:1px solid var(--gline);color:var(--txt);border-radius:10px;
    padding:8px 12px;font-size:12.5px;font-weight:600;cursor:pointer}
  .stage{position:relative;display:flex;flex-direction:column;align-items:center;margin-top:14px;min-height:560px}
  .ball{border-radius:50%;position:relative;
    background-image:radial-gradient(circle at 36% 30%, #ffffff, #c9beff 16%, var(--uv) 52%, #2a1d7a 78%, #160f3e 100%)}
  .ball .glow{position:absolute;inset:0;border-radius:50%;
    background:radial-gradient(circle at 66% 76%, rgba(255,190,27,.22), transparent 45%)}
  .ball .spark{position:absolute;top:43%;left:44%;font-size:18px;color:rgba(255,255,255,.85)}
  .float{animation:floaty 5s ease-in-out infinite, glowpulse 4s ease-in-out infinite}
  .shake{animation:shakeit .45s ease-in-out infinite, glowpulse .9s ease-in-out infinite}
  .boom{position:absolute;top:120px;width:200px;height:200px;border-radius:50%;pointer-events:none;
    background:radial-gradient(circle, rgba(255,255,255,.7), var(--lav) 40%, transparent 70%);animation:boom 1.2s ease-out forwards}
  .card{width:100%;max-width:460px;margin-top:26px;text-align:center;animation:qin .45s ease both}
  .kick{font-size:11px;font-weight:700;letter-spacing:1.5px;color:var(--mut);text-transform:uppercase}
  .prompt{font-size:21px;font-weight:800;margin:8px 0 20px;line-height:1.25}
  .opts{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
  .opt{display:flex;flex-direction:column;align-items:flex-start;gap:2px;text-align:left;max-width:220px;padding:11px 16px;border-radius:11px;font-size:14px;font-weight:600;cursor:pointer;
    border:1px solid var(--gline);background:var(--glass);color:var(--txt);transition:all .15s}
  .opt:hover{background:rgba(255,255,255,.09);border-color:var(--lav)}
  .opt.active{background:var(--uv);border-color:var(--uv);color:#fff}
  .optsub{font-size:11px;font-weight:500;color:var(--txt2);line-height:1.25}
  .opt.active .optsub{color:rgba(255,255,255,.85)}
  .hint{display:inline-flex;align-items:flex-start;gap:7px;max-width:380px;margin:0 auto 18px;padding:8px 12px;border-radius:11px;text-align:left;
    background:rgba(255,190,27,0.10);border:1px solid rgba(255,190,27,0.35);color:#F4E7C4;font-size:12px;line-height:1.4}
  .info-btn{width:18px;height:18px;border-radius:50%;font-size:11px;font-weight:800;line-height:16px;padding:0;cursor:pointer;background:transparent}
  .info-pop{font-size:12.5px;color:var(--txt);background:rgba(255,255,255,0.06);border:1px solid var(--gline);border-radius:10px;padding:9px 11px;margin:6px 0 2px;line-height:1.45}
  .jrny{background:rgba(0,0,0,0.22);border-radius:12px;padding:14px 12px;margin:14px 0 6px}
  .jrny-hd{font-size:11px;font-weight:800;letter-spacing:1px;color:var(--lav);text-transform:uppercase;margin-bottom:12px;text-align:center}
  .jrny-row{display:flex;align-items:flex-start;flex-wrap:wrap;justify-content:center;gap:2px}
  .jstep{display:flex;flex-direction:column;align-items:center;width:66px;text-align:center}
  .jball{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;background:rgba(255,255,255,0.08);border:1px solid var(--gline)}
  .jball.win{background:linear-gradient(135deg,#FFBE1B,#E8A64E);border-color:var(--gold);box-shadow:0 0 16px var(--gold)}
  .jlbl{font-size:10.5px;font-weight:700;color:var(--txt);margin-top:6px;line-height:1.2}
  .jlbl.win{color:var(--gold)}
  .jsub{font-size:9.5px;color:var(--mut);margin-top:1px}
  .jarrow{color:var(--mut);font-size:14px;align-self:center;margin-top:-14px}
  .bigval{font-size:34px;font-weight:800;color:#fff;margin-bottom:16px;letter-spacing:-.01em}
  .range{width:100%;accent-color:var(--uv);height:4px}
  .numrow{display:flex;align-items:center;justify-content:center;gap:6px;margin:16px 0 20px}
  .num{width:120px;padding:8px 10px;border-radius:9px;border:1px solid var(--gline);font-size:15px;font-weight:700;
    color:var(--lav);text-align:center;outline:none;background:rgba(0,0,0,.3)}
  .cta{display:inline-flex;align-items:center;justify-content:center;gap:8px;background:var(--uv);color:#fff;border:none;
    border-radius:11px;padding:13px 26px;font-size:14.5px;font-weight:700;cursor:pointer;box-shadow:0 8px 26px rgba(83,54,255,.45)}
  .dots{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:26px}
  .dot{width:6px;height:6px;border-radius:4px;background:rgba(255,255,255,.18);transition:all .2s}
  .dot.on{width:18px;background:var(--uv)}
  .dot.done{background:var(--lav)}
  .back{display:inline-flex;align-items:center;gap:5px;margin-top:14px;background:none;border:none;color:var(--txt2);
    font-size:12.5px;font-weight:600;cursor:pointer}
  .capfields{display:flex;flex-direction:column;gap:10px;text-align:left}
  .capin{padding:12px 14px;border-radius:11px;border:1px solid var(--gline);font-size:14px;background:rgba(0,0,0,.3);color:var(--txt);outline:none}
  .err{font-size:12px;color:#FF9BA6;margin-top:10px}
  .tiny{font-size:10.5px;color:var(--mut);line-height:1.5}
  .running{margin-top:30px;font-size:15px;color:var(--lav);font-weight:600;animation:twinkle 1.1s ease-in-out infinite;position:relative;z-index:3}
  .revk{font-size:11px;font-weight:700;letter-spacing:2px;color:var(--gold);text-transform:uppercase;margin-top:12px}
  .headline{font-size:24px;font-weight:800;margin:4px 0 4px;line-height:1.15}
  .subline{font-size:12.5px;color:var(--txt2);margin-bottom:6px}
  .orbs{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;margin:16px auto 6px;max-width:620px}
  .orb{display:flex;flex-direction:column;align-items:center;cursor:pointer;width:118px;transition:transform .2s, filter .2s}
  .orb:hover{transform:scale(1.08);filter:brightness(1.12)}
  .orbball{width:82px;height:82px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:19px}
  .orbname{font-size:12.5px;font-weight:700;margin-top:9px;color:var(--txt)}
  .orbline{font-size:10.5px;font-weight:600;margin-top:2px;line-height:1.2}
  .runagain{margin-top:8px;background:none;border:1px solid var(--gline);color:var(--txt2);border-radius:10px;padding:8px 16px;font-size:12.5px;font-weight:600;cursor:pointer}
  .vision{width:100%;max-width:560px;background:var(--glass);border:1px solid var(--gline);border-radius:16px;padding:18px;margin-top:6px;animation:burst .4s ease both}
  .visback{display:flex;align-items:center;gap:6px;background:none;border:none;color:var(--txt2);font-size:12.5px;font-weight:600;cursor:pointer;padding:0;margin-bottom:12px}
  .vishead{display:flex;align-items:center;gap:12px;margin-bottom:4px}
  .visdot{width:44px;height:44px;border-radius:50%;flex-shrink:0}
  .visname{font-size:19px;font-weight:800}
  .vistag{font-size:12px;font-weight:600}
  .visnote{font-size:13.5px;color:var(--txt2);margin:8px 0 2px;line-height:1.45}
  .nums{display:flex;gap:10px;flex-wrap:wrap;margin:14px 0}
  .numbox{flex:1 1 90px;background:rgba(0,0,0,.25);border-radius:10px;padding:9px 11px}
  .numlbl{font-size:10px;color:var(--mut);text-transform:uppercase;letter-spacing:.5px}
  .numval{font-size:15px;font-weight:800;margin-top:2px}
  .tl{position:relative;display:flex;justify-content:space-between;margin:16px 4px 10px}
  .tlline{position:absolute;left:9%;right:9%;top:6px;height:2px;background:linear-gradient(90deg,var(--uv),var(--gold))}
  .tlnode{position:relative;display:flex;flex-direction:column;align-items:center;flex:1;text-align:center;z-index:1}
  .tlbullet{width:13px;height:13px;border-radius:7px}
  .tllbl{font-size:11px;font-weight:700;margin-top:6px;color:var(--txt)}
  .tlsub{font-size:10px;color:var(--mut)}
  .reading{background:rgba(0,0,0,.28);border-radius:12px;padding:14px;margin-top:6px}
  .readhd{display:flex;align-items:center;gap:7px;margin-bottom:8px;font-size:13px;font-weight:700;color:var(--gold)}
  .readtxt{font-size:13px;line-height:1.55;color:#E6E2FF;white-space:pre-wrap;max-height:220px;overflow-y:auto}
  .chat{width:100%;max-width:560px;margin-top:18px}
  .chatrow{display:flex;gap:8px}
  .chatin{flex:1;padding:11px 14px;border-radius:11px;border:1px solid var(--gline);font-size:13px;background:rgba(0,0,0,.3);color:var(--txt);outline:none}
  .chatbtn{display:flex;align-items:center;gap:6px;padding:11px 16px;border-radius:11px;border:none;background:var(--gold);color:#3a2a00;font-weight:700;font-size:13px;cursor:pointer}
  .chatout{background:rgba(0,0,0,.28);border-radius:12px;padding:14px;margin-top:10px;font-size:13px;line-height:1.55;color:#E6E2FF;white-space:pre-wrap}
  .disc{font-size:10.5px;color:var(--mut);text-align:center;margin-top:22px}
  @keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
  @keyframes shakeit{0%,100%{transform:translate(0,0) rotate(0)}20%{transform:translate(-6px,3px) rotate(-3deg)}40%{transform:translate(6px,-3px) rotate(3deg)}60%{transform:translate(-5px,-2px) rotate(-2deg)}80%{transform:translate(5px,2px) rotate(2deg)}}
  @keyframes glowpulse{0%,100%{box-shadow:0 0 50px 6px rgba(83,54,255,.55),0 0 120px 30px rgba(117,114,255,.25)}50%{box-shadow:0 0 70px 12px rgba(117,114,255,.7),0 0 160px 50px rgba(83,54,255,.35)}}
  @keyframes boom{0%{transform:scale(.2);opacity:.9}100%{transform:scale(3.4);opacity:0}}
  @keyframes burst{0%{transform:scale(.2) translateY(20px);opacity:0}60%{opacity:1}100%{transform:scale(1) translateY(0);opacity:1}}
  @keyframes twinkle{0%,100%{opacity:.25}50%{opacity:1}}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
  @keyframes qin{0%{opacity:0;transform:translateY(14px)}100%{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div id="stars"></div>
<div class="wrap">
  <div class="hdr">
    <div>
      <div class="brandrow">PRYPCO <span class="sq"></span></div>
      <div class="title">The Ownership Simulator</div>
      <div class="tagline">Tell it your present. It tells you your possible futures.</div>
    </div>
    <button id="startover" class="ghost" style="display:none">↻ Start over</button>
  </div>
  <div id="stage" class="stage"></div>
</div>

<script>
/* ============ CONNECT YOUR CRM HERE ============
   Paste a Salesforce Web-to-Lead URL, or a Zapier/Make webhook that creates a Salesforce lead.
   Left blank, everything is still saved to this browser (localStorage) + console so nothing is lost. */
const LEAD_ENDPOINT = "https://script.google.com/macros/s/AKfycbwocd84PJXlcWXAuOzZjfhiTL6ZN4iXPSudTToEyudBn4ZHOJZRuLUwncCYJgCOFksX/exec";

/* ---------- palette (JS-composed gradients) ---------- */
const UV="#5336FF", LAV="#7572FF", GOLD="#FFBE1B";
const C_WALLET="#7572FF", C_BLOCKS="#5FA8FF", C_MINT="#33CBB8", C_GOLD="#E8A64E", C_MORT="#36D6A0", C_GV="#FFBE1B", C_WILL="#B07CF0";

const CFG={dldFee:.04,agentFee:.02,mortReg:.0025,processing:.01,valuation:3000,gvThreshold:2000000,maxTenor:25};
const fmt=n=>"AED "+Math.round(n).toLocaleString();
const moLabel=m=>isFinite(m)?m+" months":"not yet";
const clamp=(v,lo,hi)=>Math.max(lo,Math.min(hi,v));

function ltvFor(s,p,u,r){if(!r)return .5;if(u==="second")return s==="national"?.65:s==="nonresident"?.5:.6;if(p<=5e6)return s==="national"?.85:s==="nonresident"?.6:.8;return s==="national"?.75:s==="nonresident"?.55:.7;}
const dbrCap=s=>s==="national"?.6:.5;
const ageCap=s=>s==="national"?70:65;
function amort(P,pct,y){const r=pct/100/12,n=y*12;return r===0?P/n:(P*r*Math.pow(1+r,n))/(Math.pow(1+r,n)-1);}
function loanFromPayment(M,pct,y){const r=pct/100/12,n=y*12;return r===0?M*n:(M*(Math.pow(1+r,n)-1))/(r*Math.pow(1+r,n));}
function creditBand(s){if(s>=740)return{adj:0,odds:.92,label:"Excellent"};if(s>=700)return{adj:.3,odds:.82,label:"Very good"};if(s>=660)return{adj:.7,odds:.70,label:"Good"};if(s>=600)return{adj:1.3,odds:.50,label:"Fair"};return{adj:2.2,odds:.28,label:"Building"};}

const GOALS=[{id:"buy",label:"Buy a home",blurb:"Can I afford it, and when?"},{id:"downpayment",label:"Save for a down payment",blurb:"How long until I have enough to start?"},{id:"mortgage",label:"See what I can borrow",blurb:"How big a home loan could I get?"},{id:"goldenvisa",label:"Get a Golden Visa",blurb:"Own property, earn 10-year UAE residency."},{id:"renovate",label:"Renovate my home",blurb:"Save up for home improvements."},{id:"refinance",label:"Lower my mortgage",blurb:"Could a better rate cut my monthly payment?"}];

const PROD={
  // Home Wallet intentionally removed for now (not a live app yet) — re-add here when ready.
  blocks:{name:"PRYPCO Blocks",short:"Blocks",color:C_BLOCKS,tag:"Fractional property ownership from AED 500",plain:"Own a small share of a real Dubai property — you can start with as little as AED 500.",cta:{label:"Get the Blocks app",url:"https://prypco.go.link/h17Nh"}},
  mint:{name:"PRYPCO Mint",short:"Mint",color:C_MINT,tag:"Tokenized property, tradable 24/7",plain:"Buy small digital pieces of property (from about AED 2,000) that you can sell any time, like shares.",cta:{label:"Get the Mint app",url:"https://prypcomint.go.link/dVXQd"}},
  gold:{name:"PRYPCO Mint Gold",short:"Mint Gold",color:C_GOLD,tag:"Tokenized gold to diversify your pot",plain:"Own digital gold — a steadier way to grow your savings alongside property.",cta:{label:"Get the Mint app",url:"https://prypcomint.go.link/dVXQd"}},
  mort:{name:"PRYPCO Mortgage",short:"Mortgage",color:C_MORT,tag:"Digital mortgages across 18 UAE banks",plain:"A home loan from a bank. You pay a deposit; the bank covers the rest and you repay monthly.",cta:{label:"Get pre-approved",url:"https://mortgage.prypco.com/pre-approval"}},
  gv:{name:"PRYPCO Golden Visa",short:"Golden Visa",color:C_GV,tag:"10-year UAE residency at AED 2M+",plain:"A 10-year UAE residency you can earn by owning property worth AED 2M or more.",cta:{label:"Know more",url:"https://prypco.com/goldenvisa"}},
  will:{name:"PRYPCO Will",short:"Will",color:C_WILL,tag:"Protect your assets with a registered Will",plain:"A registered document that makes sure your assets go to the people you choose.",cta:{label:"Know more",url:"https://prypco.com"}}
};
const COMBO={name:"Your fast-track",short:"Fast-track",color:UV,tag:"A few PRYPCO products together, so you reach your goal faster",plain:"A combined plan that stacks a few PRYPCO products so you reach your goal faster."};
const COMBO_BAL={name:"Balanced fast-track",short:"Balanced",color:"#8E7BF0",tag:"Property + digital gold, compounding together",plain:"A balanced mix of property and gold so your money grows while staying diversified."};
const RATE={cash:0,gold:0.06,prop:0.08,blend:0.07};
function etaBadge(f){const e=f.etaMonths;if(e===0)return "Now";if(e==null||!isFinite(e))return f.badge||"";return `≈ ${e} mo`;}
function futureTimeline(f,res){
  const e=f.etaMonths;
  if(e===0)return[{l:"Today",s:"now"},{l:"Pre-approval",s:"~1 mo"},{l:"Offer",s:"~2 mo"},{l:"Keys",s:"~3 mo"}];
  if(e==null||!isFinite(e)){ if(res.mode==="refinance")return[{l:"Today",s:"now"},{l:"Switch",s:"~1 mo"},{l:"Saving starts",s:"~2 mo"}]; return[{l:"Today",s:"now"},{l:"Pre-approval",s:"~1 mo"},{l:"Offer",s:"~2 mo"},{l:"Move in",s:"~3 mo"}]; }
  return[{l:"Today",s:"now"},{l:"Halfway",s:Math.round(e/2)+" mo"},{l:"Deposit ready",s:e+" mo"},{l:"Keys",s:"~"+(e+2)+" mo"}];
}
function storySteps(f,res,x){
  const e=f.etaMonths, gv=res.gvEligible||x.price>=CFG.gvThreshold;
  const St=(icon,label,sub)=>({icon,label,sub});
  const win=(m)=>St("🎉","Goals reached!",(m!=null&&isFinite(m))?"~"+m+" mo":"~3 mo");
  const growLabel=f.prod===PROD.gold?"Grow with gold":f.prod===PROD.mort?"Save the deposit":(f.combo?"Grow + save more":"Grow with "+f.prod.short);
  const growIcon=f.prod===PROD.gold?"🪙":f.prod===PROD.mort?"💰":"📈";
  if(res.mode==="refinance") return [St("🚀","Start"),St("🔍","Compare rates"),St("🔁","Switch loan"),St("💸","Save monthly"),win(1)];
  if(res.mode==="savings") return [St("🚀","Start"),St(growIcon,growLabel,isFinite(e)?e+" mo":""),St("🛠️","Budget ready"),St("🏡","Renovate"),win(e)];
  if(x.goal==="goldenvisa"&&!gv) return [St("🚀","Start"),St(growIcon,growLabel,isFinite(e)?e+" mo":""),St("🎯","Reach AED 2M"),St("🏠","Buy home"),St("🛂","Golden Visa"),win(e)];
  if(x.goal==="goldenvisa"||(e===0&&x.affordable)){
    const s=[St("🚀","Start"),St("🏦","Mortgage"),St("🏠","Your home")];
    if(gv)s.push(St("🛂","Golden Visa"));
    s.push(St("📈","Keep growing"),St("🛡️","Protect with Will"),win(0));
    return s;
  }
  if(x.goal==="mortgage"){
    const s=[St("🚀","Start"),St("✅","Pre-approval"),St(growIcon,growLabel,(isFinite(e)&&e>0)?e+" mo":""),St("🔎","Find a home"),St("🏠","Move in")];
    if(gv)s.push(St("🛂","Golden Visa"));
    s.push(win(e));
    return s;
  }
  const s=[St("🚀","Start"),St(growIcon,growLabel,isFinite(e)?e+" mo":""),St("💰","Down payment"),St("🏦","Mortgage"),St("🏠","Your home")];
  if(gv)s.push(St("🛂","Golden Visa"));
  s.push(St("📈","Keep growing"),St("🛡️","Will"),win(e));
  return s;
}

/* ---------- state ---------- */
const S={goal:"buy",income:25000,joint:false,coIncome:18000,cash:150000,invest:80000,ret:6,monthly:4000,
  family:2,score:720,debt:1500,age:35,price:1800000,status:"expat",use:"first",ready:true,
  renoBudget:120000,rfBalance:1200000,rfCurRate:5.75,rfNewRate:4.1,rfYears:20,
  leadName:"",leadEmail:"",leadMobile:""};
const U={phase:"journey",step:0,selected:null,showInfo:false,leadDone:false,leadErr:""};
let currentQ=null, currentFutures=[], timer=null;

/* ---------- engine ---------- */
function getMetrics(){
  const band=creditBand(S.score), baseRate=4.2, effRate=baseRate+band.adj;
  const effIncome=S.income+(S.joint?S.coIncome:0);
  const available=S.cash+S.invest;
  const term=clamp(Math.min(CFG.maxTenor,ageCap(S.status)-S.age),5,25);
  let res;
  if(S.goal==="refinance"){const cur=amort(S.rfBalance,S.rfCurRate,S.rfYears),nw=amort(S.rfBalance,S.rfNewRate,S.rfYears),save=cur-nw;res={mode:"refinance",cur,nw,save,lifetime:save*S.rfYears*12,term:S.rfYears};}
  else if(S.goal==="renovate"){res={mode:"savings",target:S.renoBudget};}
  else{
    const ltv=ltvFor(S.status,S.price,S.use,S.ready),down=S.price*(1-ltv),loan=S.price-down;
    const fees=S.price*CFG.dldFee+S.price*CFG.agentFee+loan*CFG.mortReg+loan*CFG.processing+CFG.valuation;
    const upfront=down+fees,payment=amort(loan,effRate,term);
    const maxMonthly=Math.max(0,dbrCap(S.status)*effIncome-S.debt),dbrOk=payment<=maxMonthly;
    const firstLtv=ltvFor(S.status,Math.min(S.price,5e6),"first",S.ready),maxPrice=loanFromPayment(maxMonthly,effRate,term)/firstLtv;
    let odds=band.odds; if(!dbrOk)odds*=.45; odds=clamp(odds,.05,.97);
    res={mode:"property",ltv,down,loan,fees,upfront,payment,maxMonthly,dbrOk,maxPrice,gvEligible:S.price>=CFG.gvThreshold,term,odds};
  }
  const target=res.mode==="property"?res.upfront:res.mode==="savings"?res.target:0;
  const wealthAt=(m,c2)=>S.cash+c2*m+S.invest*Math.pow(1+S.ret/100,m/12);
  const monthsForAmount=(amt,c2)=>{if(amt<=available)return 0;for(let m=1;m<=360;m++)if(wealthAt(m,c2)>=amt)return m;return Infinity;};
  const steadyM=monthsForAmount(target,S.monthly), stretchM=monthsForAmount(target,S.monthly*1.5);
  const needed=Math.max(0,target-available);
  function computeUpfront(p){const ltv=ltvFor(S.status,p,S.use,S.ready),down=p*(1-ltv),loan=p-down;return down+(p*CFG.dldFee+p*CFG.agentFee+loan*CFG.mortReg+loan*CFG.processing+CFG.valuation);}
  const gvUpfront=computeUpfront(CFG.gvThreshold), gvMonths=monthsForAmount(gvUpfront,S.monthly), gap=Math.max(0,CFG.gvThreshold-S.price);
  const grow=(targetV,m,rate)=>{if(targetV<=available)return 0;for(let k=1;k<=600;k++){const w=available*Math.pow(1+rate,k/12)+m*k;if(w>=targetV)return k;}return Infinity;};
  return {band,effRate,effIncome,available,res,target,steadyM,stretchM,needed,gvUpfront,gvMonths,gap,grow};
}

  const nBoost=c.grow(t,c.monthly*1.3,RATE.prop);

  combos.push({prod:COMBO_BAL,combo:true,ctas:[PROD.mort.cta,PROD.blocks.cta,PROD.mint.cta,PROD.gold.cta],line:"Property + gold blend",note:"Spread your deposit across Blocks, Mint and digital gold so it compounds while staying diversified, then finance the rest with a mortgage.",ask:"Explain a balanced blend of Blocks, Mint, gold and a mortgage.",etaMonths:c.grow(t,c.monthly*1.15,RATE.blend)});

function futuresFor(M){return oraclesFor(S.goal,M.res,Object.assign({},M,{price:S.price,monthly:S.monthly}));}
function bestComboMonths(M){const f=futuresFor(M);return f.combos[0]&&isFinite(f.combos[0].etaMonths)?f.combos[0].etaMonths:(isFinite(M.steadyM)?M.steadyM:null);}

function timelineFor(goal,res,c){
  if(goal==="mortgage")return[{l:"Today",s:"now"},{l:"Documents",s:"~1 mo"},{l:"Pre-approval",s:"~2 mo"},{l:"Offer",s:"~3 mo"}];
  if(goal==="downpayment")return[{l:"Today",s:"now"},{l:"Halfway",s:isFinite(c.steadyM)?Math.round(c.steadyM/2)+" mo":"—"},{l:"Deposit",s:isFinite(c.steadyM)?c.steadyM+" mo":"—"},{l:"Pre-approval",s:"next"}];
  if(goal==="goldenvisa")return res.gvEligible?[{l:"Today",s:"now"},{l:"Purchase",s:"~2 mo"},{l:"Visa filed",s:"~3 mo"},{l:"10-yr visa",s:"~4 mo"}]:[{l:"Today",s:"now"},{l:"AED 2M funds",s:isFinite(c.gvMonths)?c.gvMonths+" mo":"—"},{l:"Purchase",s:isFinite(c.gvMonths)?"+2 mo":"—"},{l:"Visa",s:isFinite(c.gvMonths)?"+4 mo":"—"}];
  if(c.needed<=0)return[{l:"Today",s:"now"},{l:"Pre-approval",s:"~1 mo"},{l:"Offer",s:"~2 mo"},{l:"Move in",s:"~3 mo"}];
  return[{l:"Today",s:"now"},{l:"Deposit",s:isFinite(c.steadyM)?c.steadyM+" mo":"—"},{l:"Pre-approval",s:isFinite(c.steadyM)?"+1 mo":"—"},{l:"Keys",s:isFinite(c.steadyM)?"~"+(c.steadyM+2)+" mo":"—"}];
}

function headlineFor(M){
  const {res,needed,steadyM,gvMonths}=M;
  if(res.mode==="refinance")return res.save>0?`Save ${fmt(res.save)} every month`:"No saving at this rate";
  if(res.mode==="savings")return needed<=0?"Your budget is covered":isFinite(steadyM)?`${steadyM} months to your budget`:"Set a monthly saving";
  if(S.goal==="mortgage")return res.dbrOk?`You can borrow up to ${fmt(res.maxPrice)}`:`Capped at ${fmt(res.maxPrice)} by the 50% rule`;
  if(S.goal==="goldenvisa")return res.gvEligible?"You qualify for the Golden Visa":isFinite(gvMonths)?`${gvMonths} months to qualify`:"Aim for AED 2M";
  if(S.goal==="downpayment")return needed<=0?"Your deposit is ready":(bestComboMonths(M)!=null?`Own in as little as ${bestComboMonths(M)} months`:"Set a monthly saving");
  if(needed<=0&&res.dbrOk)return "You can buy now";
  if(needed<=0&&!res.dbrOk)return "Cash ready — income is tight";
  return bestComboMonths(M)!=null?`Own in as little as ${bestComboMonths(M)} months`:"Set a monthly saving";
}

const DA="\n\nIndicative only — not financial advice.";

  if(/\bwill\b/.test(q)) return `A PRYPCO Will registers your wishes for your UAE assets, so your property passes smoothly to the people you choose — important for expats without an automatic local inheritance framework. Next: set one up once your purchase completes.`+DA;

  if(/blocks|fractional/.test(q)) return `PRYPCO Blocks lets you start owning property from AED 500 today — so you're in the market while you build toward the ${fmt(M.target)} you need. Fractional shares can appreciate and earn rental income alongside your savings. Next: browse live Blocks opportunities and start with a small ticket.`+DA;
  if(/mint|token/.test(q)) return `PRYPCO Mint turns property into tokens you can buy from about AED 2,000 and trade 24/7 on a regulated marketplace — your money grows in real estate but stays liquid if plans change. Next: browse tokenized listings on the Mint app.`+DA;
  if(/pre-approv|mortgage|borrow|finance|bank|afford/.test(q)){
    if(res.mode!=="property") return `PRYPCO Mortgage compares offers across 18 UAE banks in one application. Next: once you have a target property, run a pre-approval.`+DA;
    return `On your income you can borrow toward roughly ${fmt(res.maxPrice)} within the 50% debt limit — about ${fmt(res.payment)}/mo, with ${Math.round(res.odds*100)}% approval odds on your ${M.band.label.toLowerCase()} credit. PRYPCO Mortgage compares 18 UAE banks at once. Next: ${res.dbrOk?"get a pre-approval to lock it in":"trim an EMI or add a co-applicant to lift your limit first"}.`+DA;
  }
  if(/visa|residen|2m|2 m|co-own|golden/.test(q)){
    if(res.gvEligible||S.price>=CFG.gvThreshold) return `At ${fmt(S.price)} you clear the AED 2M line, so the 10-year Golden Visa is on the table — PRYPCO handles the paperwork end to end, and dependents can join. Next: start the application once you've reserved the home.`+DA;
    return `You're ${fmt(M.gap)} below the AED 2M Golden Visa line; a qualifying home needs about ${fmt(M.gvUpfront)} upfront, roughly ${moLabel(M.gvMonths)} away at your current saving — or co-own to combine shares. Next: set your target at AED 2M and build toward it.`+DA;
  }
  if(/combined|together|all at once|own sooner|own it sooner|co-own/.test(q)){
    const gvOk=res.gvEligible||S.price>=CFG.gvThreshold;
    if(S.goal==="goldenvisa"&&!gvOk) return `Combined route to the visa: build qualifying value with Blocks (from AED 500) and Mint (tokenized, tradable), and co-own to combine shares across AED 2M — about ${moLabel(M.gvMonths)} away at your pace — then finance the balance with a mortgage and claim the 10-year visa. Next: open Blocks/Mint and set your AED 2M target.`+DA;
    if(res.mode!=="property") return `Combine financing with investing: use a mortgage for the property and keep Blocks and Mint growing your money alongside. Next: pick your goal and I'll size each piece.`+DA;
    return `The combined play: finance up to about ${fmt(res.maxPrice)} with a mortgage (≈${fmt(res.payment)}/mo)${gvOk?", claim the 10-year Golden Visa since you're at AED 2M+,":""} and keep Blocks and Mint growing on the side. Doing it all at once means you own sooner instead of waiting to save the whole amount. Next: get a mortgage pre-approval, then start small recurring Blocks/Mint contributions.`+DA;
  }
  if(/save|deposit|month|sooner|faster|how long|when/.test(q)){
    return `At ${fmt(S.monthly)}/mo you reach the ${fmt(M.target)} you need in about ${moLabel(M.steadyM)}. Save 50% more and it's ${moLabel(M.stretchM)}; growing it in Blocks or Mint at ${S.ret}%/yr can help too. Next: set up small recurring contributions and track the milestone.`+DA;
  }
  if(res.mode==="property") return `Here's your picture: about ${fmt(res.upfront)} to get in, ${fmt(res.payment)}/mo on a mortgage, and ${M.needed<=0?"you already have the cash needed":`a gap of ${fmt(M.needed)} — roughly ${moLabel(M.steadyM)} of saving at ${fmt(S.monthly)}/mo`}. The orbs above show your paths across PRYPCO. Next: tap the one that fits and I'll break it down.`+DA;
  return `Here's your picture based on what you told me. The orbs above show your paths across the PRYPCO ecosystem — tap any one for the detail. Next: pick the path that fits your plan.`+DA;
}

/* ---------- questions ---------- */

  if(S.goal==="refinance"){

      {key:"rfCurRate",type:"num",prompt:"What rate are you paying now?",hint:"Not sure? It's on your latest bank statement — a rough number is fine.",min:2,max:9,step:.05,unit:"%"},
      {key:"rfNewRate",type:"num",prompt:"What new rate could you get?",hint:"Even 1% lower can save a lot over the years.",min:2,max:9,step:.05,unit:"%"},
      {key:"rfYears",type:"num",prompt:"How many years are left to pay?",min:1,max:25,step:1,unit:"yr"});

    qs.push({key:"renoBudget",type:"num",prompt:"What's your renovation budget?",min:10000,max:1000000,step:5000,unit:"AED"},
      {key:"cash",type:"num",prompt:"How much have you saved so far?",min:0,max:2000000,step:5000,unit:"AED"},
      {key:"invest",type:"num",prompt:"Any savings or investments? (value today)",hint:"Money in Blocks, Mint or gold can grow while you save.",min:0,max:3000000,step:5000,unit:"AED"});

    qs.push({key:"monthly",type:"num",prompt:"How much can you save each month?",min:0,max:50000,step:250,unit:"AED"});
  }else{
    qs.push({key:"income",type:"num",prompt:"What's your monthly income? (before tax)",hint:"Banks decide how much you can borrow mainly from your income.",min:5000,max:200000,step:1000,unit:"AED"});
    qs.push({key:"joint",type:"choice",prompt:"Buying on your own, or with someone?",hint:"Adding a co-buyer usually lets you borrow more — and own a bigger home.",options:[{label:"Just me",value:false},{label:"With someone",value:true}]});
    if(S.joint) qs.push({key:"coIncome",type:"num",prompt:"Their monthly income? (before tax)",min:0,max:200000,step:1000,unit:"AED"});
    qs.push({key:"monthly",type:"num",prompt:"How much can you set aside each month?",hint:"Even a small amount, grown with Blocks or Mint, adds up faster.",min:0,max:80000,step:250,unit:"AED"});
    qs.push({key:"cash",type:"num",prompt:"How much have you saved so far?",hint:"This becomes your down payment — most first homes need about 20% up front.",min:0,max:5000000,step:10000,unit:"AED"});
    qs.push({key:"invest",type:"num",prompt:"Any savings or investments? (value today)",hint:"Money already invested keeps growing toward your goal.",min:0,max:5000000,step:10000,unit:"AED"});
    if(S.invest>0) qs.push({key:"ret",type:"num",prompt:"How much do they grow per year?",hint:"A rough guess is fine.",min:0,max:20,step:.5,unit:"%"});
    qs.push({key:"debt",type:"num",prompt:"Monthly payments on loans & cards?",hint:"Lower monthly debts free up more income for a mortgage.",min:0,max:50000,step:250,unit:"AED"});
    qs.push({key:"family",type:"num",prompt:"How many people in your household?",min:1,max:8,step:1,unit:"ppl"});
    qs.push({key:"age",type:"num",prompt:"How old are you?",min:21,max:64,step:1,unit:""});
    qs.push({key:"score",type:"num",prompt:"Your credit score? (a rough guess is fine)",hint:"A higher score can unlock a better interest rate.",min:300,max:850,step:5,unit:""});
    qs.push({key:"price",type:"num",prompt:"What's the price of the home?",hint:"A home worth AED 2M+ can also earn you a 10-year Golden Visa.",min:400000,max:15000000,step:50000,unit:"AED"});
    qs.push({key:"status",type:"choice",prompt:"Which best describes you?",options:[{label:"Resident expat",value:"expat"},{label:"UAE national",value:"national"},{label:"Non-resident",value:"nonresident"}]});

function fmtDisp(v,unit){return unit==="AED"?fmt(v):unit==="%"?v+"%":unit==="ppl"?v+(v===1?" person":" people"):v+(unit?" "+unit:"");}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
const orbGrad=col=>`radial-gradient(circle at 34% 30%, #ffffff, ${col} 46%, rgba(10,7,30,0.9) 92%)`;

/* ---------- render ---------- */
function render(){
  const stage=document.getElementById("stage");

  document.getElementById("startover").style.display = U.phase==="journey" ? "none" : "block";

  const progress=qs.length>1?U.step/(qs.length-1):0;

    html+=`<div style="margin-top:${U.phase==="revealed"?6:U.phase==="journey"?14:40}px">
      <div class="ball ${U.phase==="gazing"?"shake":"float"}" style="width:${size}px;height:${size}px" ${U.phase!=="gazing"&&U.phase!=="capture"?'id="ballclick"':''}>

      </div></div>`;
  }
  if(U.phase==="gazing") html+=`<div class="boom"></div>`;

  if(U.phase==="journey"){
    currentQ=qs[Math.min(U.step,qs.length-1)];
    html+=`<div class="card"><div class="kick">Question ${U.step+1} of ${qs.length}</div><div class="prompt">${esc(currentQ.prompt)}</div>`;
    if(currentQ.hint) html+=`<div class="hint"><span style="font-size:14px;line-height:1.3">💡</span><span>${esc(currentQ.hint)}</span></div>`;
    if(currentQ.type==="choice"){
      html+=`<div class="opts">`+currentQ.options.map((o,i)=>`<button class="opt ${S[currentQ.key]===o.value?"active":""}" data-i="${i}">${esc(o.label)}${o.sub?`<span class="optsub">${esc(o.sub)}</span>`:""}</button>`).join("")+`</div>`;
    }else{
      const v=S[currentQ.key];
      html+=`<div class="bigval" id="bigval">${fmtDisp(v,currentQ.unit)}</div>
        <input type="range" class="range" id="jrange" min="${currentQ.min}" max="${currentQ.max}" step="${currentQ.step}" value="${Math.min(v,currentQ.max)}">
        <div class="numrow">${currentQ.unit==="AED"?'<span style="font-size:12px;color:var(--mut)">AED</span>':''}
          <input type="number" class="num" id="jnum" value="${v}" min="${currentQ.min}" step="${currentQ.step}" ${currentQ.unit==="AED"?'':'style="width:80px"'}>
          ${currentQ.unit&&currentQ.unit!=="AED"?`<span style="font-size:12px;color:var(--mut)">${currentQ.unit}</span>`:''}
        </div>
        <button class="cta" id="contbtn">Continue →</button>`;
    }
    html+=`<div class="dots">`+qs.map((_,i)=>`<span class="dot ${i===U.step?"on":i<U.step?"done":""}"></span>`).join("")+`</div>`;
    if(U.step>0) html+=`<button class="back" id="backbtn">← Back</button>`;
    html+=`</div>`;
  }

  if(U.phase==="capture"){
    html+=`<div class="card" style="max-width:420px">
      <div class="kick">Last step</div>
      <div class="prompt" style="margin-bottom:6px">How should we reach out to you?</div>
      <div class="subline" style="margin-bottom:18px">Tell us a bit about you and we'll map your futures.</div>
      <div class="capfields">
        <input class="capin" id="capname" placeholder="Full name" value="${esc(S.leadName)}">
        <input class="capin" id="capemail" type="email" placeholder="Email address" value="${esc(S.leadEmail)}">
        <input class="capin" id="capmobile" type="tel" placeholder="Mobile number" value="${esc(S.leadMobile)}">
      </div>
      ${U.leadErr?`<div class="err">${esc(U.leadErr)}</div>`:''}
      <button class="cta" id="revealbtn" style="margin-top:16px;width:100%">✦ Reveal my futures</button>
      <button class="back" id="backbtn">← Back</button>
      <div class="tiny" style="margin-top:14px">By continuing you agree to be contacted by PRYPCO about your results.</div>
    </div>`;
  }

  if(U.phase==="gazing"){
    const fn=S.leadName.trim().split(" ")[0];
    html+=`<div class="running">${fn?`Reading ${esc(fn)}'s results…`:"Running your simulation…"}</div>`;
  }

  if(U.phase==="revealed"){
    const F=futuresFor(M);
    const etaVal=f=>(f.etaMonths==null||!isFinite(f.etaMonths))?1e9:f.etaMonths;
    const sortedInd=[...F.individuals].sort((a,b)=>etaVal(a)-etaVal(b));
    currentFutures=[...sortedInd,...F.combos];
    const orbHTML=(f,gi,di)=>`
          <div class="orb" data-i="${gi}">
            <div class="orbball" style="background-image:${orbGrad(f.prod.color)};box-shadow:0 0 26px ${f.prod.color}88;animation:bob ${3+(di%3)*0.4}s ease-in-out ${di*0.2}s infinite">${GLYPHS[di%GLYPHS.length]}</div>
            ${etaBadge(f)?`<div style="margin-top:8px;font-size:10.5px;font-weight:800;color:#fff;background:rgba(255,255,255,0.08);border:1px solid var(--gline);border-radius:20px;padding:2px 9px">${esc(etaBadge(f))}</div>`:""}
            <div class="orbname">${esc(f.prod.short)}</div>
            <div class="orbline" style="color:${f.prod.color}">${esc(f.line)}</div>
          </div>`;
    if(U.selected===null){
      html+=`<div style="width:100%;text-align:center">
        <div class="revk">The simulation shows</div>
        <div class="headline">${esc(headlineFor(M))}</div>
        <div class="subline">Your paths, soonest first — tap any one to explore.</div>
        <div class="orbs">`+sortedInd.map((f,i)=>orbHTML(f,i,i)).join("")+`</div>
        ${F.combos.length?`
        <div style="margin-top:18px">
          <div style="display:flex;align-items:center;gap:10px;max-width:460px;margin:0 auto 4px">
            <div style="flex:1;height:1px;background:var(--gline)"></div>
            <div style="font-size:11px;font-weight:800;letter-spacing:1.5px;color:var(--uv);text-transform:uppercase">Or — fast-track your goal</div>
            <div style="flex:1;height:1px;background:var(--gline)"></div>
          </div>
          <div style="font-size:12px;color:var(--txt2);margin-bottom:8px">Combine paths for a quicker result.</div>
          <div class="orbs">`+F.combos.map((f,j)=>orbHTML(f,sortedInd.length+j,sortedInd.length+j)).join("")+`</div>
        </div>`:""}
        <div style="font-size:10px;color:var(--mut);margin-top:12px">Growth figures are illustrative assumptions (~6–8% p.a.), not guarantees.</div>
        <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:8px">
          <button class="runagain" id="runagain">↻ Run again</button>
          <button class="runagain" id="editanswers">✎ Edit answers</button>
        </div>
      </div>`;
    }else{
      const f=currentFutures[U.selected], res=M.res;
      const story=storySteps(f,res,{price:S.price,goal:S.goal,affordable:M.needed<=0&&res.dbrOk});
      const nums=res.mode==="property"
        ? [[S.goal==="mortgage"?"Max home":"Upfront",S.goal==="mortgage"?fmt(res.maxPrice):fmt(res.upfront)],["Monthly",fmt(res.payment)],["Approval",Math.round(res.odds*100)+"%"],["Down",fmt(res.down)]]
        : res.mode==="savings"
          ? [["Budget",fmt(M.target)],["You have",fmt(M.available)],["Gap",fmt(M.needed)],["Monthly",fmt(S.monthly)]]
          : [["Now",fmt(res.cur)],["New",fmt(res.nw)],["Save/mo",fmt(res.save)],["Lifetime",fmt(res.lifetime)]];
      html+=`<div class="vision">
        <button class="visback" id="visback">← Back to your paths</button>
        <div class="vishead">
          <div class="visdot" style="background-image:${orbGrad(f.prod.color)};box-shadow:0 0 18px ${f.prod.color}99"></div>
          <div style="flex:1"><div style="display:flex;align-items:center;gap:8px"><div class="visname">${esc(f.prod.name)}</div>${f.prod.plain?`<button class="info-btn" id="infobtn" title="What is this?" style="border:1px solid ${f.prod.color};color:${U.showInfo?"#0E0A22":f.prod.color};background:${U.showInfo?f.prod.color:"transparent"}">i</button>`:""}</div><div class="vistag" style="color:${f.prod.color}">${esc(f.prod.tag)}</div></div>
        </div>
        ${U.showInfo&&f.prod.plain?`<div class="info-pop">${esc(f.prod.plain)}</div>`:""}
        <div class="visnote">${esc(f.note)}</div>
        <div class="nums">`+nums.map(n=>`<div class="numbox"><div class="numlbl">${n[0]}</div><div class="numval">${n[1]}</div></div>`).join("")+`</div>
        <div class="jrny"><div class="jrny-hd">Your journey</div><div class="jrny-row">`+story.map((n,i)=>{const last=i===story.length-1;return `<div class="jstep"><div class="jball ${last?"win":""}">${n.icon}</div><div class="jlbl ${last?"win":""}">${esc(n.label)}</div>${n.sub?`<div class="jsub">${esc(n.sub)}</div>`:""}</div>${last?"":`<div class="jarrow">→</div>`}`;}).join("")+`</div></div>
        <div class="reading"><div class="readhd">✦ What this path means</div><div class="readtxt">${esc(coachAnswer(f.ask))}</div></div>
        <div style="margin-top:14px">
          <div style="font-size:12px;font-weight:700;color:var(--txt2);margin-bottom:8px">${f.combo?"Take the first steps":"Take the first step"}</div>
          <div style="display:flex;gap:8px;flex-wrap:wrap">${(f.combo?f.ctas:[f.prod.cta]).map((cta,i)=>{const primary=!f.combo||i===0;const bg=primary?(f.combo?"var(--uv)":f.prod.color):"rgba(255,255,255,0.06)";const col=primary?"#0E0A22":"#fff";const bd=primary?"transparent":"var(--gline)";return `<a href="${cta.url}" target="_blank" rel="noopener noreferrer" style="text-decoration:none;display:inline-flex;align-items:center;gap:6px;background:${bg};color:${col};border:1px solid ${bd};border-radius:10px;padding:11px 15px;font-size:13.5px;font-weight:800">${esc(cta.label)} →</a>`;}).join("")}</div>
        </div>
      </div>`;
    }
    html+=`<div class="chat"><div class="chatrow">
      <input class="chatin" id="chatin" placeholder="Ask a follow-up question…">
      <button class="chatbtn" id="chatbtn">Ask</button></div>
      <div class="chatout" id="chatout" style="display:none"></div></div>`;
  }

  html+=`<div class="disc">Indicative only — not financial advice. Every figure is calculated from your real answers.</div>`;
  stage.innerHTML=html;
  wire();
}

/* ---------- wiring ---------- */
function wire(){
  const ball=document.getElementById("ballclick");
  if(ball){ ball.style.cursor="pointer"; ball.onclick=()=>{ if(U.phase==="journey") finishJourney(); }; }

  document.querySelectorAll(".opt").forEach(b=>b.onclick=()=>{
    const o=currentQ.options[+b.dataset.i]; S[currentQ.key]=o.value;
    const qs=buildQuestions();
    if(U.step>=qs.length-1) finishJourney(); else { U.step++; render(); }
  });

  const jr=document.getElementById("jrange"), jn=document.getElementById("jnum"), bv=document.getElementById("bigval");
  if(jr) jr.oninput=()=>{ S[currentQ.key]=Number(jr.value); if(jn)jn.value=jr.value; if(bv)bv.textContent=fmtDisp(Number(jr.value),currentQ.unit); };
  if(jn) jn.oninput=()=>{ let v=jn.value===""?currentQ.min:Math.max(currentQ.min,Number(jn.value)); S[currentQ.key]=v; if(jr)jr.value=Math.min(v,currentQ.max); if(bv)bv.textContent=fmtDisp(v,currentQ.unit); };
  const cb=document.getElementById("contbtn"); if(cb) cb.onclick=next;
  const bk=document.getElementById("backbtn"); if(bk) bk.onclick=back;

  const cn=document.getElementById("capname"); if(cn) cn.oninput=()=>S.leadName=cn.value;
  const ce=document.getElementById("capemail"); if(ce) ce.oninput=()=>S.leadEmail=ce.value;
  const cm=document.getElementById("capmobile"); if(cm){ cm.oninput=()=>S.leadMobile=cm.value; cm.onkeydown=e=>{if(e.key==="Enter")onReveal();}; }
  const rb=document.getElementById("revealbtn"); if(rb) rb.onclick=onReveal;

  document.querySelectorAll(".orb").forEach(o=>o.onclick=()=>{ U.selected=+o.dataset.i; U.showInfo=false; render(); });
  const vb=document.getElementById("visback"); if(vb) vb.onclick=()=>{ U.selected=null; U.showInfo=false; render(); };
  const ib=document.getElementById("infobtn"); if(ib) ib.onclick=()=>{ U.showInfo=!U.showInfo; render(); };
  const ra=document.getElementById("runagain"); if(ra) ra.onclick=gaze;
  const ea=document.getElementById("editanswers"); if(ea) ea.onclick=()=>{ U.phase="journey"; U.step=0; U.selected=null; render(); };

  const ci=document.getElementById("chatin"), cbtn=document.getElementById("chatbtn"), co=document.getElementById("chatout");
  function ask(){ const t=ci.value.trim(); if(!t)return; co.style.display="block"; co.textContent=coachAnswer(t); }
  if(cbtn) cbtn.onclick=ask;
  if(ci) ci.onkeydown=e=>{ if(e.key==="Enter") ask(); };

  document.getElementById("startover").onclick=()=>{ U.phase="journey"; U.step=0; U.selected=null; render(); };
}

/* ---------- flow ---------- */
function next(){ const qs=buildQuestions(); if(U.step>=qs.length-1) finishJourney(); else { U.step++; render(); } }
function back(){ if(U.phase==="revealed"||U.phase==="capture"){ U.phase="journey"; U.step=buildQuestions().length-1; render(); return; } if(U.step>0){ U.step--; render(); } }
function finishJourney(){ if(U.leadDone) gaze(); else { U.phase="capture"; render(); } }
function gaze(){ U.selected=null; U.phase="gazing"; render(); clearTimeout(timer); timer=setTimeout(()=>{ U.phase="revealed"; render(); },1700); }
function onReveal(){
  const emailOk=/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(S.leadEmail.trim());
  const mobileOk=S.leadMobile.replace(/\D/g,"").length>=7;
  if(!S.leadName.trim()){ U.leadErr="Please enter your full name."; return render(); }
  if(!emailOk){ U.leadErr="Please enter a valid email address."; return render(); }
  if(!mobileOk){ U.leadErr="Please enter a valid mobile number."; return render(); }
  U.leadErr=""; U.leadDone=true; submitLead(); gaze();
}

function buildPayload(){
  const M=getMetrics(), res=M.res;
  const answers={goal:S.goal,monthlyIncome:S.income,jointOwnership:S.joint,coApplicantIncome:S.joint?S.coIncome:0,monthlySaving:S.monthly,cashSaved:S.cash,investments:S.invest,investReturnPct:S.ret,existingDebt:S.debt,familySize:S.family,age:S.age,creditScore:S.score,propertyPrice:S.price,buyerType:S.status,propertyUse:S.use,propertyType:S.ready?"ready":"off-plan",renovationBudget:S.renoBudget,refinance:{balance:S.rfBalance,currentRate:S.rfCurRate,newRate:S.rfNewRate,years:S.rfYears}};
  const result={headline:headlineFor(M),mode:res.mode,monthsToReady:isFinite(M.steadyM)?M.steadyM:null,upfront:res.upfront||null,monthlyPayment:res.payment||null,maxProperty:res.maxPrice||null,goldenVisaEligible:!!res.gvEligible,paths:(()=>{const F=futuresFor(M);return [...F.individuals,...F.combos].map(f=>f.prod.name);})()};
  return {capturedAt:new Date().toISOString(),source:"Ownership Simulator",lead:{fullName:S.leadName.trim(),email:S.leadEmail.trim(),mobile:S.leadMobile.trim()},answers,result};
}
async function submitLead(){
  const payload=buildPayload();
  try{ if(LEAD_ENDPOINT) fetch(LEAD_ENDPOINT,{method:"POST",mode:"no-cors",body:JSON.stringify(payload)}); }catch(e){}
  try{ const k="prypco_leads"; const arr=JSON.parse(localStorage.getItem(k)||"[]"); arr.push(payload); localStorage.setItem(k,JSON.stringify(arr)); }catch(e){}
  try{ console.log("PRYPCO Simulator — lead captured:",payload); }catch(e){}
}

/* ---------- stars ---------- */
(function(){ const s=document.getElementById("stars"); let h=""; for(let i=0;i<52;i++){ const sz=Math.random()*2+1; h+=`<div class="star" style="top:${(Math.random()*100).toFixed(2)}%;left:${(Math.random()*100).toFixed(2)}%;width:${sz}px;height:${sz}px;opacity:.5;animation:twinkle ${(2+Math.random()*3).toFixed(2)}s ease-in-out ${(Math.random()*4).toFixed(2)}s infinite"></div>`; } s.innerHTML=h; })();

render();
</script>
